name: 'Setup'
description: 'Installs dependencies and builds the project with CMake on Linux and Windows (MSVC)'
inputs:
  buildtype:
    description: 'CMake build type (Release or Debug)'
    required: true
    default: 'Release'

runs:
  using: "composite"
  steps:
    - name: Add LunarG Vulkan SDK repository
      if: runner.os == 'Linux'
      shell: bash
      run: |
        wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
        sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list https://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
        sudo apt-get update

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get install -y \
          gcc \
          cmake \
          ninja-build \
          libvulkan-dev \
          vulkan-headers \
          shaderc \
          vulkan-utility-libraries-dev \
          libassimp-dev \
          libcglm-dev \
          libsixel-dev \
          pkg-config \
          libvips-dev

    - name: Setup MSVC developer environment
      if: runner.os == 'Windows'
      uses: ilammy/msvc-dev-cmd@v1
      with:
        arch: x64

    - name: Configure + Build (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        cmake -S . -B build -G Ninja \
          -D CMAKE_BUILD_TYPE=${{ inputs.buildtype }} \
          -D USE_BUNDLED=OFF \
          -D USE_SANITIZERS=OFF
        cmake --build build --config ${{ inputs.buildtype }}

    - name: Configure + Build bundled deps (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        cmake -S cmake.deps -B .deps -G Ninja `
          -D CMAKE_BUILD_TYPE=${{ inputs.buildtype }} `
          -D DCAT_VCPKG_TRIPLET=x64-windows
        cmake --build .deps --config ${{ inputs.buildtype }}

    - name: Configure + Build (Windows)
      if: runner.os == 'Windows'
      shell: pwsh
      run: |
        $depsPrefix = Join-Path $env:GITHUB_WORKSPACE ".deps\vcpkg_installed\x64-windows"
        cmake -S . -B build -G Ninja `
          -D CMAKE_BUILD_TYPE=${{ inputs.buildtype }} `
          -D USE_BUNDLED=ON `
          -D USE_SANITIZERS=OFF `
          -D DEPS_PREFIX="$depsPrefix"
        cmake --build build --config ${{ inputs.buildtype }}
