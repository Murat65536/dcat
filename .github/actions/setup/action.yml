name: 'Setup'
description: 'Installs dependencies and builds the project with Meson on Linux and Windows (MSYS2)'
inputs:
  buildtype:
    description: 'Meson build type (release or debug)'
    required: true
    default: 'release'

runs:
  using: "composite"
  steps:
    - name: Add LunarG Vulkan SDK repository
      if: runner.os == 'Linux'
      shell: bash
      run: |
        wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
        sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list https://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
        sudo apt-get update

    - name: Install Linux dependencies
      if: runner.os == 'Linux'
      shell: bash
      run: |
        sudo apt-get install -y \
          gcc \
          ccache \
          meson \
          ninja-build \
          libvulkan-dev \
          vulkan-headers \
          vulkan-utility-libraries-dev \
          libassimp-dev \
          libcglm-dev \
          libsixel-dev \
          pkg-config \
          libvips-dev

    - name: Setup MSYS2
      if: runner.os == 'Windows'
      uses: msys2/setup-msys2@v2
      with:
        msystem: clang64
        update: true
        install: >-
          mingw-w64-clang-x86_64-toolchain
          mingw-w64-clang-x86_64-ccache
          mingw-w64-clang-x86_64-meson
          mingw-w64-clang-x86_64-ninja
          mingw-w64-clang-x86_64-cmake
          mingw-w64-clang-x86_64-pkgconf
          mingw-w64-clang-x86_64-vulkan-headers
          mingw-w64-clang-x86_64-vulkan-loader
          mingw-w64-clang-x86_64-vulkan-utility-libraries
          mingw-w64-clang-x86_64-assimp
          mingw-w64-clang-x86_64-cglm
          mingw-w64-clang-x86_64-libvips
          git

    - name: Install Slang (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        SLANG_VERSION=2026.11
        cd "$RUNNER_TEMP"
        curl -sSL -o slang.tar.gz \
          "https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/slang-${SLANG_VERSION}-linux-x86_64.tar.gz"
        mkdir -p slang
        tar -xzf slang.tar.gz -C slang
        echo "$RUNNER_TEMP/slang/bin" >> "$GITHUB_PATH"

    - name: Install Slang (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        SLANG_VERSION=2026.11
        TMP="$(cygpath -u "$RUNNER_TEMP")"
        cd "$TMP"
        curl -sSL -o slang.tar.gz \
          "https://github.com/shader-slang/slang/releases/download/v${SLANG_VERSION}/slang-${SLANG_VERSION}-windows-x86_64.tar.gz"
        mkdir -p slang
        tar -xzf slang.tar.gz -C slang
        # setup-msys2 uses path-type=minimal, so $GITHUB_PATH (a Windows PATH
        # entry) is stripped from the msys2 shell. Copy slangc + its DLLs into a
        # dir already on the msys2 PATH instead.
        cp -r slang/bin/. "$MINGW_PREFIX/bin/"

    - name: Set ccache dir
      shell: bash
      run: echo "CCACHE_DIR=${{ github.workspace }}/.ccache" >> "$GITHUB_ENV"

    - name: Cache Meson subproject downloads
      uses: actions/cache@v6
      with:
        path: subprojects/packagecache
        key: packagecache-${{ runner.os }}-${{ hashFiles('subprojects/*.wrap') }}

    - name: Cache ccache
      uses: actions/cache@v6
      with:
        path: ${{ github.workspace }}/.ccache
        key: ccache-${{ runner.os }}-${{ inputs.buildtype }}-${{ github.sha }}
        restore-keys: |
          ccache-${{ runner.os }}-${{ inputs.buildtype }}-
          ccache-${{ runner.os }}-

    - name: Configure + Build (Linux)
      if: runner.os == 'Linux'
      shell: bash
      run: |
        BUILDTYPE=$(echo "${{ inputs.buildtype }}" | tr '[:upper:]' '[:lower:]')
        meson setup build -Dbuildtype=$BUILDTYPE -Dtests=enabled --wrap-mode=nofallback
        meson compile -C build
        meson test -C build --print-errorlogs
        ccache --show-stats

    - name: Configure + Build (Windows)
      if: runner.os == 'Windows'
      shell: msys2 {0}
      run: |
        BUILDTYPE=$(echo "${{ inputs.buildtype }}" | tr '[:upper:]' '[:lower:]')
        meson setup buildDir -Dbuildtype=$BUILDTYPE -Ddefault_library=shared -Dbundled_libsixel=enabled -Dtests=enabled --wrap-mode=nofallback
        meson compile -C buildDir
        meson test -C buildDir --print-errorlogs
        ccache --show-stats
