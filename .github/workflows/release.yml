name: Release

on:
  push:
    tags:
      - 'v*'
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

jobs:
  release-windows:
    name: Windows Installer Release
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - name: Build
        uses: ./.github/actions/setup
        with:
          buildtype: 'Release'

      - name: Package DLLs
        shell: msys2 {0}
        run: |
          bash .github/scripts/package.sh

      - name: Compile Inno Setup Script
        shell: bash
        run: |
          if [[ $GITHUB_REF == refs/tags/v* ]]; then
            VERSION=${GITHUB_REF#refs/tags/v}
          else
            VERSION=$(git describe --tags --always --match 'v[0-9]*' 2>/dev/null || echo 0.0.0-dev)
          fi
          DCAT_VERSION="$VERSION" iscc packaging/windows/dcat.iss

      - name: Upload Windows Artifact
        uses: actions/upload-artifact@v7
        with:
          name: dcat-windows-installer
          path: installer/dcat-windows-setup.exe

  release-linux:
    name: Linux AppImage Release
    # ponytail: old glibc broadens compatibility; use an Ubuntu 22.04 container when this hosted image retires.
    runs-on: ubuntu-22.04
    permissions:
      contents: write
    needs: [ release-windows ]
    steps:
      - uses: actions/checkout@v6

      - name: Install Meson
        run: |
          pipx install 'meson==1.10.1'
          pipx environment --value PIPX_BIN_DIR >> "$GITHUB_PATH"

      - name: Build
        uses: ./.github/actions/setup
        with:
          buildtype: 'Release'

      - name: Build AppImage
        env:
          LINUXDEPLOY_VERSION: 1-alpha-20251107-1
          LINUXDEPLOY_SHA256: c20cd71e3a4e3b80c3483cef793cda3f4e990aca14014d23c544ca3ce1270b4d
        run: |
          curl -fL -o linuxdeploy-x86_64.AppImage \
            "https://github.com/linuxdeploy/linuxdeploy/releases/download/${LINUXDEPLOY_VERSION}/linuxdeploy-x86_64.AppImage"
          echo "${LINUXDEPLOY_SHA256}  linuxdeploy-x86_64.AppImage" | sha256sum --check
          chmod +x linuxdeploy-x86_64.AppImage

          mkdir -p AppDir/usr/bin/shaders AppDir/usr/share/doc/dcat
          cp build/shaders/*.spv AppDir/usr/bin/shaders/
          cp LICENSE AppDir/usr/share/doc/dcat/
          if [ -d "$RUNNER_TEMP/chafa-1.18.2" ]; then
            mkdir -p AppDir/usr/share/doc/chafa
            cp "$RUNNER_TEMP/chafa-1.18.2"/COPYING* AppDir/usr/share/doc/chafa/
          fi

          APPIMAGE_EXTRACT_AND_RUN=1 ./linuxdeploy-x86_64.AppImage \
            --appdir AppDir \
            --executable build/dcat \
            --desktop-file packaging/linux/dcat.desktop \
            --icon-file packaging/linux/dcat.svg \
            --output appimage

          appimage=$(find . -maxdepth 1 -name 'dcat*.AppImage' -print -quit)
          test -n "$appimage"
          if [ "$appimage" != "./dcat-x86_64.AppImage" ]; then
            mv "$appimage" dcat-x86_64.AppImage
          fi
          APPIMAGE_EXTRACT_AND_RUN=1 ./dcat-x86_64.AppImage --help >/dev/null

      - name: Download Windows Artifact
        uses: actions/download-artifact@v8
        with:
          name: dcat-windows-installer
          path: .

      - name: Publish Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [[ $GITHUB_REF == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            gh release create "$TAG_NAME" dcat-x86_64.AppImage dcat-windows-setup.exe \
              --title "Release $TAG_NAME" \
              --generate-notes
          else
            gh release delete nightly --yes || true
            git push origin :nightly || true
            gh release create nightly dcat-x86_64.AppImage dcat-windows-setup.exe \
              --prerelease \
              --title "Nightly Build" \
              --target main
          fi
